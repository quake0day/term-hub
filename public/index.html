<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>term-hub</title>
<link rel="stylesheet" href="https://unpkg.com/xterm@5.3.0/css/xterm.css" />
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: #0b0d10; color: #d6d7d9; font: 13px/1.4 -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif; }
  #app { display: grid; grid-template-rows: 40px 1fr; height: 100vh; }

  /* header */
  header { display: flex; align-items: center; justify-content: space-between; padding: 0 14px; background: #0b0d10; border-bottom: 1px solid #1d2128; }
  header .brand { display: flex; align-items: center; gap: 10px; color: #d6d7d9; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; letter-spacing: .14em; }
  header .brand b { color: #fff; letter-spacing: 0; font-weight: 700; font-size: 13px; }
  header .meta { color: #5b6473; font-size: 11px; font-family: ui-monospace, monospace; display: flex; gap: 14px; }
  header .meta .ok { color: #3fb950; } header .meta .warn { color: #d29922; }

  #body { display: grid; grid-template-columns: 260px 1fr; min-height: 0; }
  aside { background: #111418; border-right: 1px solid #1d2128; display: flex; flex-direction: column; min-height: 0; }
  .aside-h { padding: 10px 14px; font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: #5b6473; border-bottom: 1px solid #1d2128; display: flex; justify-content: space-between; align-items: center; }
  #sessions { flex: 1; overflow: auto; padding: 4px 8px 8px; }
  .group { margin-top: 6px; }
  .group-h { padding: 6px 10px; font-family: ui-monospace, monospace; font-size: 11px; color: #7a8594; display: flex; justify-content: space-between; align-items: center; }
  .group-h .chip { color: #5b6473; font-size: 10px; padding: 1px 6px; border: 1px solid #1d2128; border-radius: 3px; }
  .sess { display: flex; justify-content: space-between; align-items: center; padding: 7px 10px; border-radius: 6px; cursor: pointer; color: #b8bec8; font-family: ui-monospace, monospace; font-size: 12px; }
  .sess:hover { background: #1a1f26; }
  .sess.active { background: #1f2933; color: #fff; }
  .sess .meta { font-size: 10px; color: #5b6473; display: flex; gap: 6px; align-items: center; }
  .sess .kill { opacity: 0; color: #8892a0; padding: 0 4px; }
  .sess:hover .kill { opacity: .7; }
  .sess .kill:hover { color: #ff6b6b; opacity: 1; }

  main { display: flex; flex-direction: column; min-width: 0; }
  #tabs { display: flex; gap: 2px; padding: 6px 6px 0; background: #0b0d10; border-bottom: 1px solid #1d2128; overflow-x: auto; }
  .tab { display: flex; align-items: center; gap: 8px; padding: 7px 12px; background: #111418; border: 1px solid #1d2128; border-bottom: 0; border-radius: 6px 6px 0 0; cursor: pointer; color: #8892a0; font-family: ui-monospace, monospace; font-size: 12px; white-space: nowrap; }
  .tab.active { background: #0b0d10; color: #fff; border-color: #2f81f7; }
  .tab .host-chip { font-size: 10px; color: #5b6473; padding: 1px 5px; border: 1px solid #1d2128; border-radius: 3px; }
  .tab.active .host-chip { border-color: #2f81f7; color: #6daaff; }
  .tab .x { color: #5b6473; padding: 0 2px; }
  .tab .x:hover { color: #ff6b6b; }
  #panes { flex: 1; position: relative; background: #000; }
  .pane { position: absolute; inset: 0; padding: 6px; display: none; }
  .pane.active { display: block; }
  .pane .xterm { height: 100%; }
  #status { padding: 4px 10px; font-size: 11px; color: #5b6473; background: #0b0d10; border-top: 1px solid #1d2128; font-family: ui-monospace, monospace; }
  #status .ok { color: #3fb950; } #status .warn { color: #d29922; } #status .err { color: #f85149; }
  #welcome { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #5b6473; font-size: 13px; text-align: center; padding: 0 40px; gap: 8px; }
  #welcome code { color: #8892a0; background: #111418; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand"><b>term-hub</b> <span id="hubInfo">—</span></div>
    <div class="meta">
      <span id="counter">0 sessions</span>
      <span id="dot" class="ok">● live</span>
    </div>
  </header>
  <div id="body">
    <aside>
      <div class="aside-h"><span>sessions</span><span id="liveAgents" class="chip-style"></span></div>
      <div id="sessions"></div>
    </aside>
    <main>
      <div id="tabs"></div>
      <div id="panes">
        <div id="welcome">
          <div>No session opened yet.</div>
          <div>Run an agent on any machine to publish a terminal here:</div>
          <div><code>node agent.js http://<span id="selfHost">hub</span>:<span id="selfPort">7777</span></code></div>
        </div>
      </div>
      <div id="status">loading…</div>
    </main>
  </div>
</div>

<script src="https://unpkg.com/xterm@5.3.0/lib/xterm.js"></script>
<script src="https://unpkg.com/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
<script src="https://unpkg.com/xterm-addon-canvas@0.5.0/lib/xterm-addon-canvas.js"></script>
<script src="https://unpkg.com/xterm-addon-webgl@0.16.0/lib/xterm-addon-webgl.js"></script>
<script>
const hubInfoEl = document.getElementById('hubInfo');
const counterEl = document.getElementById('counter');
const dotEl = document.getElementById('dot');
const sessionsEl = document.getElementById('sessions');
const tabsEl = document.getElementById('tabs');
const panesEl = document.getElementById('panes');
const statusEl = document.getElementById('status');
const welcome = document.getElementById('welcome');

document.getElementById('selfHost').textContent = location.hostname || 'hub';
document.getElementById('selfPort').textContent = location.port || '7777';

const tabs = new Map(); // id -> { session, host, term, fit, ws, tabEl, paneEl }
let activeTab = null;
let sessionList = [];

const setStatus = (t, c = '') => { statusEl.innerHTML = c ? `<span class="${c}">●</span> ${t}` : t; };

async function fetchJSON(url, ms = 3500) {
  const ctl = new AbortController();
  const timer = setTimeout(() => ctl.abort(), ms);
  try { const r = await fetch(url, { signal: ctl.signal }); if (!r.ok) throw new Error(r.status); return await r.json(); }
  finally { clearTimeout(timer); }
}

async function loadInfo() {
  try {
    const info = await fetchJSON('/api/info');
    hubInfoEl.textContent = `broker @ ${info.host} · ${info.platform}`;
    dotEl.className = 'ok'; dotEl.textContent = '● live';
  } catch {
    hubInfoEl.textContent = '— (broker unreachable)';
    dotEl.className = 'err'; dotEl.textContent = '● offline';
  }
}

async function refreshSessions() {
  let list = [];
  try { list = await fetchJSON('/api/sessions'); }
  catch { setStatus('cannot reach broker', 'err'); return; }
  sessionList = list;
  counterEl.textContent = `${list.length} session${list.length === 1 ? '' : 's'}`;
  renderSessions();
}

function renderSessions() {
  sessionsEl.innerHTML = '';
  if (sessionList.length === 0) {
    sessionsEl.innerHTML = '<div style="padding:14px;color:#5b6473;font-size:12px">no active sessions — start an agent on some machine</div>';
    return;
  }
  // group by host
  const byHost = new Map();
  for (const s of sessionList) {
    if (!byHost.has(s.host)) byHost.set(s.host, []);
    byHost.get(s.host).push(s);
  }
  for (const [host, list] of [...byHost.entries()].sort()) {
    const group = document.createElement('div');
    group.className = 'group';
    const h = document.createElement('div');
    h.className = 'group-h';
    h.innerHTML = `<span>${host}</span><span class="chip">${list.length}</span>`;
    group.appendChild(h);
    for (const s of list) {
      const row = document.createElement('div');
      const isOpen = [...tabs.values()].some(t => t.session === s.name);
      row.className = 'sess' + (isOpen ? ' active' : '');
      const subs = s.subscribers ? ` · ${s.subscribers} viewer${s.subscribers === 1 ? '' : 's'}` : '';
      const up = s.uptimeSec != null ? ` · ${fmtUptime(s.uptimeSec)}` : '';
      row.innerHTML = `<span>${s.name}</span><span class="meta"><span>${s.cols}×${s.rows}${subs}${up}</span><a class="kill" title="kill">✕</a></span>`;
      row.onclick = (e) => {
        if (e.target.classList.contains('kill')) {
          e.stopPropagation();
          fetch(`/api/sessions/${encodeURIComponent(s.name)}/kill`, { method: 'POST' })
            .then(() => refreshSessions());
          return;
        }
        openSession(s);
      };
      group.appendChild(row);
    }
    sessionsEl.appendChild(group);
  }
}

function fmtUptime(sec) {
  if (sec < 60) return `${sec}s`;
  if (sec < 3600) return `${Math.round(sec / 60)}m`;
  if (sec < 86400) return `${Math.round(sec / 3600)}h`;
  return `${Math.round(sec / 86400)}d`;
}

function openSession(s) {
  for (const [id, t] of tabs) if (t.session === s.name) { activate(id); return; }
  createTab(s);
}

function createTab(s) {
  const id = 'tab-' + Math.random().toString(36).slice(2, 8);
  welcome?.remove();

  const term = new Terminal({
    fontFamily: '"JetBrainsMono Nerd Font", "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, "Cascadia Mono", monospace',
    fontSize: 13,
    lineHeight: 1.0,
    letterSpacing: 0,
    cursorBlink: true,
    theme: { background: '#000000' },
    scrollback: 10000,
    allowProposedApi: true,
  });
  const fit = new FitAddon.FitAddon();
  term.loadAddon(fit);

  const paneEl = document.createElement('div');
  paneEl.className = 'pane';
  panesEl.appendChild(paneEl);
  term.open(paneEl);

  // Suppress xterm.js auto-replies to terminal-capability queries (DA1/DA2/DA3,
  // DSR, XTVERSION). The hub replays session history on attach — if any of it
  // contains such a query, xterm.js would otherwise answer it and that answer
  // would be sent back through the hub as *typed input*, landing as garbage
  // on the publisher's local shell. The authoritative responder is already
  // the agent's native TTY; subscribers must stay silent.
  const suppress = () => true;
  try {
    const P = term.parser;
    if (P) {
      P.registerCsiHandler({ final: 'c' }, suppress);                  // DA1
      P.registerCsiHandler({ prefix: '>', final: 'c' }, suppress);     // DA2
      P.registerCsiHandler({ prefix: '=', final: 'c' }, suppress);     // DA3
      P.registerCsiHandler({ final: 'n' }, suppress);                  // DSR
      P.registerCsiHandler({ prefix: '?', final: 'n' }, suppress);     // private DSR
      P.registerDcsHandler({ intermediates: '+', final: 'q' }, suppress); // XTGETTCAP
    }
  } catch {}

  // Prefer WebGL renderer (sharpest block-element glyphs), fall back to Canvas.
  // Both render Unicode box-drawing / half-block characters as perfect vectors,
  // eliminating the seams that the DOM renderer leaves between cells.
  let usingRenderer = 'dom';
  try {
    const webgl = new WebglAddon.WebglAddon();
    webgl.onContextLoss(() => webgl.dispose());
    term.loadAddon(webgl);
    usingRenderer = 'webgl';
  } catch (e) {
    try {
      term.loadAddon(new CanvasAddon.CanvasAddon());
      usingRenderer = 'canvas';
    } catch {}
  }
  fit.fit();

  const tabEl = document.createElement('div');
  tabEl.className = 'tab';
  tabEl.innerHTML = `<span class="host-chip">${s.host}</span><span>${s.name}</span><span class="x" title="close">✕</span>`;
  tabEl.onclick = (e) => {
    if (e.target.classList.contains('x')) { e.stopPropagation(); closeTab(id); return; }
    activate(id);
  };
  tabsEl.appendChild(tabEl);

  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const wsUrl = `${proto}://${location.host}/ws/subscribe?session=${encodeURIComponent(s.name)}`;
  const ws = new WebSocket(wsUrl);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => setStatus(`attaching: ${s.host}:${s.name}`);
  ws.onmessage = (ev) => {
    if (typeof ev.data === 'string') {
      if (ev.data.startsWith('{')) {
        try {
          const msg = JSON.parse(ev.data);
          if (msg.type === 'attached') { setStatus(`attached: ${msg.host}:${msg.session}`, 'ok'); return; }
          if (msg.type === 'exit') { setStatus(`exited: ${s.host}:${s.name} (${msg.exitCode})`, 'warn'); return; }
          if (msg.type === 'publisher-gone') { setStatus(`publisher gone: ${s.host}:${s.name}`, 'warn'); return; }
          if (msg.type === 'resize') { return; /* publisher resized; we follow via fit on our side */ }
        } catch {}
      }
      term.write(ev.data);
    } else {
      term.write(new Uint8Array(ev.data));
    }
  };
  ws.onclose = () => setStatus(`disconnected: ${s.host}:${s.name}`, 'warn');
  ws.onerror = () => setStatus(`error: ${s.host}:${s.name}`, 'err');

  // Second-level guard: strip any report-shaped escape sequence that still
  // slips through (e.g. CPR `ESC [ n;m R`, status `ESC [ 0 n`). User-typed
  // arrow/Home/End/F-keys all end in A-H, P-S, or ~ — never c / n / R.
  const REPORT_RE = /\x1b\[(\?[\d;]*c|>[\d;]*c|=[\d;]*c|[\d;]*[Rn])/g;
  term.onData(d => {
    if (ws.readyState !== 1) return;
    const clean = d.replace(REPORT_RE, '');
    if (clean) ws.send(clean);
  });
  term.onResize(({ cols, rows }) => {
    if (ws.readyState === 1) ws.send(JSON.stringify({ type: 'resize', cols, rows }));
  });

  tabs.set(id, { session: s.name, host: s.host, term, fit, ws, tabEl, paneEl });
  activate(id);
  setTimeout(refreshSessions, 300);
}

function activate(id) {
  activeTab = id;
  for (const [tid, t] of tabs) {
    const on = tid === id;
    t.tabEl.classList.toggle('active', on);
    t.paneEl.classList.toggle('active', on);
    if (on) { t.fit.fit(); t.term.focus(); }
  }
  renderSessions();
}

function closeTab(id) {
  const t = tabs.get(id); if (!t) return;
  try { t.ws.close(); } catch {}
  try { t.term.dispose(); } catch {}
  t.tabEl.remove(); t.paneEl.remove();
  tabs.delete(id);
  if (activeTab === id) {
    const next = tabs.keys().next().value;
    activeTab = null;
    if (next) activate(next); else setStatus('no open tabs');
  }
  renderSessions();
}

window.addEventListener('resize', () => {
  const t = tabs.get(activeTab); if (t) t.fit.fit();
});

(async () => {
  await loadInfo();
  await refreshSessions();
  setInterval(async () => { await loadInfo(); await refreshSessions(); }, 2500);
})();
</script>
</body>
</html>
